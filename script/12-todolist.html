<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> upgrate Todo list</title>
</head>
<style> 
  body{
  font-family: Arial;
}
.todo-grid,
.todo-input-gride{
    display: grid;
    grid-template-columns: 200px 150px 100px;
    column-gap: 10px;
    row-gap: 10px;
    align-items: center;
}
.todo-input-gride{
    margin-bottom: 10px;
    align-items: stretch;
}
.name-input,
.date-input{
    font-size: 15px;
    padding: 6px;
}
.add-todo-bttn{
    background-color: green;
    color: white;
    border: none;
    font-size:15px;
    cursor: pointer;
   
}
.delete-bttn{
    background-color: darkred;
      color: white;
    border: none;
    font-size:15px;
    cursor: pointer;
    padding: 10px 0 10px 0;

}
</style>
<body>
    <p>To do list</p>
    <div class="todo-input-gride">
    <input type="text" placeholder="to do list" class="js-name name-input">
    <input type="date" class="js-due-date date-input">
    <button class="add-todo-bttn" onclick="addList();">Add</button>
      </div>
    <div class="js-todo-list todo-grid">text</div>
      
    <script>
        const array =[{name: 'wash dishes',
            duedate:'2026-02-21'
        }, {
            name:'make dinner',
    duedate: '2026-02-22'}];

randertodolist();
function randertodolist(){
  let arrayHTML = '';
  array.forEach(function(arrayObject,index){
const{ name,duedate }= arrayObject;  //this is shortcut for above line  it called disturing  when verable name is same as property name 
const html =`<div>${name}</div>
           <div>${duedate}</div>    
        <button  onclick ="
        array.splice(${index},1);
         randertodolist();
    " class="delete-bttn"> delete</button>`;
   
arrayHTML += html
  })


 document.querySelector('.js-todo-list').
 innerHTML = arrayHTML;
}
function addList(){
  const element = document.querySelector('.js-name');
  const name = element.value;
 const dateelement = document.querySelector('.js-due-date');
 const duedate = dateelement.value;
  array.push({name,duedate});

  element.value ='';  //this make become text empty
  randertodolist();
} 
    </script>
</body>
</html>
